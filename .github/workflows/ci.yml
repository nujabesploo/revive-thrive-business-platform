name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py

      - name: Route smoke tests
        run: |
          python - <<'PY'
          from app import app

          paths = [
              "/",
              "/health",
              "/services",
              "/book",
              "/contact",
              "/success",
              "/admin/login",
          ]

          with app.test_client() as client:
              for path in paths:
                  res = client.get(path, follow_redirects=False)
                  assert res.status_code < 500, f"{path} returned {res.status_code}"

              protected = ["/admin", "/status", "/inventory", "/api/bookings", "/api/inventory"]
              for path in protected:
                  res = client.get(path, follow_redirects=False)
                  assert res.status_code in (302, 401, 403), f"{path} expected auth gate, got {res.status_code}"

          print("Route smoke tests passed")
          PY

      - name: Docker build test
        run: docker build -t revive-thrive-platform:ci .
