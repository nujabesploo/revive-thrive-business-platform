---
- name: Install OS dependencies
  ansible.builtin.apt:
    name:
      - python3
      - python3-venv
      - python3-pip
      - nginx
      - git
      - curl
    state: present
    update_cache: true

- name: Ensure project directory exists
  ansible.builtin.file:
    path: "{{ project_dir }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Ensure Python virtualenv exists
  ansible.builtin.command: "python3 -m venv {{ python_venv }}"
  args:
    creates: "{{ python_venv }}/bin/activate"

- name: Install Python requirements
  ansible.builtin.pip:
    requirements: "{{ project_dir }}/requirements.txt"
    virtualenv: "{{ python_venv }}"

- name: Install systemd service
  ansible.builtin.template:
    src: revive-thrive.service.j2
    dest: /etc/systemd/system/revive-thrive.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart revive-thrive

- name: Install Nginx site config
  ansible.builtin.template:
    src: revive-thrive-nginx.conf.j2
    dest: /etc/nginx/sites-available/revive-thrive
    mode: "0644"
  notify:
    - Restart nginx

- name: Enable Nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/revive-thrive
    dest: /etc/nginx/sites-enabled/revive-thrive
    state: link

- name: Remove default Nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Validate Nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false

- name: Ensure revive-thrive is enabled and running
  ansible.builtin.systemd:
    name: revive-thrive
    enabled: true
    state: restarted

- name: Ensure nginx is enabled and running
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: restarted

- name: Health check application locally
  ansible.builtin.uri:
    url: http://127.0.0.1/health
    status_code: 200
