global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: revive-thrive-health
    metrics_path: /health
    static_configs:
      - targets: ["host.docker.internal:5000"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
