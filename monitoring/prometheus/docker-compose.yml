version: "3.9"
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: revive-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
    depends_on:
      - node-exporter

  node-exporter:
    image: prom/node-exporter:latest
    container_name: revive-node-exporter
    ports:
      - "9100:9100"
