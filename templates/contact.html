{% extends 'base.html' %}

{% block title %}Contact | Revive & Thrive Tech{% endblock %}

{% block content %}
  <section class="section" data-reveal>
    <h1>Contact Us</h1>
    <p>Have a question or need help? Send us a message and we will get back to you.</p>
    <p>Call or text us at <a href="tel:+13476715335">(347) 671-5335</a>.</p>

    <form method="post" action="/contact" class="form">
      <div class="field-group">
        <label for="name">Name</label>
        <input id="name" name="name" required type="text" value="{{ form.get('name','') if form else '' }}" />
      </div>

      <div class="field-group">
        <label for="email">Email</label>
        <input id="email" name="email" required type="email" value="{{ form.get('email','') if form else '' }}" />
      </div>

      <div class="field-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required>{{ form.get('message','') if form else '' }}</textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="button button-primary">Send Message</button>
      </div>
    </form>
  </section>
{% endblock %}
