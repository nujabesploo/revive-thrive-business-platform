apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: revive-thrive-hpa
  namespace: revive-thrive
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: revive-thrive-app
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
