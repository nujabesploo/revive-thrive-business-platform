apiVersion: apps/v1
kind: Deployment
metadata:
  name: revive-thrive-app
  namespace: revive-thrive
spec:
  replicas: 2
  selector:
    matchLabels:
      app: revive-thrive
  template:
    metadata:
      labels:
        app: revive-thrive
    spec:
      containers:
        - name: app
          image: ghcr.io/your-org/revive-thrive-business-platform:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: revive-thrive-config
            - secretRef:
                name: revive-thrive-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
